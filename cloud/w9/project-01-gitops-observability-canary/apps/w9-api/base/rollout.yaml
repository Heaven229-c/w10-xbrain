apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: w9-api
  namespace: demo
  labels:
    app.kubernetes.io/name: w9-api
    app.kubernetes.io/part-of: w9-gitops-observability-canary
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: w9-api
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: w9-api-success-rate
        - setWeight: 50
        - pause:
            duration: 60s
        - analysis:
            templates:
              - templateName: w9-api-success-rate
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: w9-api
        app.kubernetes.io/part-of: w9-gitops-observability-canary
    spec:
      serviceAccountName: w9-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: w9-api:1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: APP_NAME
              value: w9-api
            - name: APP_VERSION
              value: v1
            - name: FAIL_RATE
              value: "0"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
