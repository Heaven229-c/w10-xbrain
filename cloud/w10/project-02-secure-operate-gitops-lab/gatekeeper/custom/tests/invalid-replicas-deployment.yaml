apiVersion: apps/v1
kind: Deployment
metadata:
  name: invalid-too-many-replicas
  namespace: demo
  labels:
    app: invalid-too-many-replicas
    owner: platform-team
    env: w10
spec:
  replicas: 6
  selector:
    matchLabels:
      app: invalid-too-many-replicas
  template:
    metadata:
      labels:
        app: invalid-too-many-replicas
        owner: platform-team
        env: w10
    spec:
      containers:
        - name: api
          image: ghcr.io/heaven229-c/w10-api:b1558d7
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            runAsUser: 10001
            runAsNonRoot: true
