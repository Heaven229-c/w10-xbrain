apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-password
  namespace: demo
  labels:
    owner: platform-team
    env: w10
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      metadata:
        labels:
          owner: platform-team
          env: w10
  data:
    - secretKey: password
      remoteRef:
        key: w10/project02/db
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
