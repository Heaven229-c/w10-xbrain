name: w9-validate-on-pr

on:
  pull_request:
    paths:
      - "cloud/w9/project-01-gitops-observability-canary/**"
      - ".github/workflows/w9-*.yml"

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Check frontend and backend source
        run: |
          set -euxo pipefail

          # 1. Install missing Python libraries before py_compile.
          pip install flask prometheus-flask-exporter

          # 2. Run py_compile without extra flags.
          python -m py_compile cloud/w9/project-01-gitops-observability-canary/app/app.py

          # 3. Check required frontend/backend files and routes.
          test -s cloud/w9/project-01-gitops-observability-canary/app/templates/index.html
          test -s cloud/w9/project-01-gitops-observability-canary/app/static/app.js
          test -s cloud/w9/project-01-gitops-observability-canary/app/static/styles.css
          grep -q "/api/status" cloud/w9/project-01-gitops-observability-canary/app/app.py
          grep -q "PrometheusMetrics(app)" cloud/w9/project-01-gitops-observability-canary/app/app.py
          grep -q "/metrics" cloud/w9/project-01-gitops-observability-canary/app/templates/index.html

      - name: Render final app manifests
        run: |
          kubectl kustomize cloud/w9/project-01-gitops-observability-canary/apps/w9-api/overlays/dev > rendered-w9-api.yaml
          test -s rendered-w9-api.yaml

      - name: Check expected final resources
        run: |
          grep -q "kind: Rollout" rendered-w9-api.yaml
          grep -q "kind: AnalysisTemplate" rendered-w9-api.yaml
          grep -q "kind: ServiceMonitor" rendered-w9-api.yaml
          grep -q "kind: PrometheusRule" rendered-w9-api.yaml
          grep -q "kind: AlertmanagerConfig" rendered-w9-api.yaml
          grep -q "image: w9-api:" rendered-w9-api.yaml

      - name: Check ArgoCD application manifests
        run: |
          test -s cloud/w9/project-01-gitops-observability-canary/argocd/app-of-apps.yaml
          test -s cloud/w9/project-01-gitops-observability-canary/argocd/apps/w9-api.yaml
          test -s cloud/w9/project-01-gitops-observability-canary/argocd/apps/argo-rollouts.yaml
          test -s cloud/w9/project-01-gitops-observability-canary/argocd/apps/kube-prometheus-stack.yaml

      - name: Block obvious plaintext secrets
        run: |
          if grep -RInE "(password|secret|token|api_key|apikey)[[:space:]]*[:=][[:space:]]*['\"]?[^'\"[:space:]]+" \
            --exclude="kube-prometheus-stack.yaml" \
            cloud/w9/project-01-gitops-observability-canary/apps \
            cloud/w9/project-01-gitops-observability-canary/argocd; then
            echo "Possible plaintext secret found. Do not commit real secrets."
            exit 1
          fi
