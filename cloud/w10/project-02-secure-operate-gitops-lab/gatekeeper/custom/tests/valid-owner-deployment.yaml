apiVersion: apps/v1
kind: Deployment
metadata:
  name: valid-owner-label
  namespace: demo
  labels:
    app: valid-owner-label
    owner: platform-team
    env: w10
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valid-owner-label
  template:
    metadata:
      labels:
        app: valid-owner-label
        owner: platform-team
        env: w10
    spec:
      containers:
        - name: api
          image: ghcr.io/heaven229-c/w10-api:b1558d7
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            runAsUser: 10001
            runAsNonRoot: true
