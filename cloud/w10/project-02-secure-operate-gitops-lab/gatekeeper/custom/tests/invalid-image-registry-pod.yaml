apiVersion: v1
kind: Pod
metadata:
  name: invalid-image-registry
  namespace: demo
  labels:
    owner: platform-team
    env: w10
spec:
  containers:
    - name: nginx
      image: docker.io/library/nginx:1.27.3
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
      securityContext:
        runAsUser: 10001
        runAsNonRoot: true
